name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hugo-build:
    name: Hugo Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.164.0" # must match netlify.toml's HUGO_VERSION pin
          extended: true

      - run: hugo --gc --minify

  lint:
    name: Lint (markdown + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint
